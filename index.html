<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>HektikCad</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles.css">
  <style>html,body{background:#0b0e13;color:#e6eaf2;margin:0;height:100%;}</style>
</head>
<body>
  <div id="app">

    <!-- ═══ HEADER ═══ -->
    <header>
      <div class="brand">
        <div class="brand-mark">
          <!-- Stroke-only variant of the VbH mark. Both paths are the full
               closed contours from the original SVG (no truncation), fill
               disabled — currentColor inherits the header text colour so the
               mark flips cleanly between light and dark themes. -->
          <svg width="20" height="20" viewBox="0 0 512 512" fill="none">
            <g transform="matrix(1.018795,0,0,1.019275,-704.225,-976.582)"
               fill="none" stroke="currentColor" stroke-width="1.5"
               stroke-linejoin="round" stroke-linecap="round"
               vector-effect="non-scaling-stroke">
              <path vector-effect="non-scaling-stroke" d="M927.76,1266.318L927.76,1341.973C927.76,1374.567 901.298,1401.028 868.705,1401.028L691.539,1401.028L691.539,958.115L868.705,958.115C901.298,958.115 927.76,984.577 927.76,1017.17L927.76,1152.231C902.488,1158.893 883.831,1181.922 883.831,1209.274C883.831,1236.626 902.488,1259.655 927.76,1266.318Z"/>
              <path vector-effect="non-scaling-stroke" d="M957.874,1152.231L957.874,1076.575C957.874,1043.981 984.336,1017.52 1016.929,1017.52L1194.094,1017.52L1194.094,1460.433L1016.929,1460.433C984.336,1460.433 957.874,1433.971 957.874,1401.378L957.874,1266.318C983.146,1259.655 1001.803,1236.626 1001.803,1209.274C1001.803,1181.922 983.146,1158.893 957.874,1152.231Z"/>
            </g>
          </svg>
        </div>
        <div class="brand-name">Hektik<span>Cad</span></div>
      </div>

      <div class="brand-doc">
        <!-- data-doc-name is our stable hook for docfile.ts; the visible text
             is updated at runtime (never rely on this fallback in production). -->
        <span data-doc-name>zeichnung.hcad</span>
        <span class="doc-dirty">•</span>
      </div>

      <nav class="menu-bar" id="menu-bar">
        <button class="menu-item" data-menu="datei">Datei</button>
        <button class="menu-item" data-menu="bearbeiten">Bearbeiten</button>
        <button class="menu-item" data-menu="ansicht">Ansicht</button>
        <button class="menu-item" data-menu="einfuegen">Einfügen</button>
        <button class="menu-item" data-menu="format">Einstellungen</button>
        <button class="menu-item" data-menu="hilfe">Hilfe</button>
      </nav>

      <span class="spacer"></span>

      <!-- Snap toolbar — lives in the header, left of the "mm" pill. Kept
           inline so palettes and floating tool HUDs in the canvas never
           occlude it, and so the top-right of the drawing area stays clear
           for the viewcube. -->
      <div class="snap-toolbar" id="snap-overlay">
        <button class="snap-ob-btn" id="tb-raster" title="Raster anzeigen (F7)">RASTER</button>
        <input class="snap-ob-grid" id="grid-size" type="number" min="0.1" step="1" value="10" title="Raster-Abstand (mm)">
        <button class="snap-ob-btn" id="tb-axes" title="Ursprungsachsen (X/Y) anzeigen">ACHSEN</button>
        <div class="snap-sep"></div>
        <button class="snap-ob-btn on" id="tb-fang" title="Alle Fangpunkte umschalten">FANG</button>
        <button class="snap-ob-btn" id="tb-gridsnap" title="Am Raster fangen (F9)">RASTER</button>
        <button class="snap-ob-btn on" id="tb-end" title="Endpunkt">END</button>
        <button class="snap-ob-btn on" id="tb-mid" title="Mittelpunkt">MITTE</button>
        <button class="snap-ob-btn on" id="tb-int" title="Schnittpunkt">SCHN</button>
        <button class="snap-ob-btn on" id="tb-ctr" title="Zentrum">ZENTR</button>
        <button class="snap-ob-btn on" id="tb-perp" title="Lotpunkt">LOT</button>
        <button class="snap-ob-btn on" id="tb-tan" title="Tangente">TANG</button>
        <button class="snap-ob-btn on" id="tb-polar" title="Polares Fangen — Hilfslinien bei Winkelvielfachen (45°)">POLAR</button>
        <button class="snap-ob-btn on" id="tb-track" title="Dynamische Hilfslinien — automatische horizontale/vertikale Ausrichtung an allen Ankerpunkten">DYN</button>
        <button class="snap-ob-btn on" id="tb-ortholock" title="Ortho-Auto-Lock — beim Zeichnen automatisch waagerecht/senkrecht fangen (Shift erzwingt 15°-Schritte)">ORTHO</button>
        <div class="snap-sep"></div>
        <button class="snap-ob-btn snap-ob-accent on" id="tb-parametric" title="Parametrisches Zeichnen — Fangpunkte werden als Verknüpfungen (PointRefs) gespeichert. Aus: Freies Zeichnen, jede Linie steht für sich, keine automatischen Nachführungen bei Änderungen anderer Objekte.">PARAM</button>
      </div>

      <span class="hdr-units">mm</span>

      <div class="hdr-actions">
        <button class="hdr-btn" id="btn-save" title="Speichern (Strg+S)">Speichern</button>
        <button class="hdr-btn" id="btn-import" title="Importieren (Strg+Shift+I)">Import</button>
        <button class="hdr-btn" id="btn-export" title="Exportieren (Strg+Shift+E)">Export</button>
      </div>
      <div id="theme-popover" class="theme-popover" hidden></div>
      <div id="menu-popover" class="menu-popover" hidden></div>
    </header>

    <!-- ═══ TOOL RAIL ═══ -->
    <div id="tools"></div>

    <!-- ═══ CANVAS ═══ -->
    <div id="canvaswrap">
      <canvas id="cv"></canvas>

      <!-- Dimension mode picker (visible only while the dim tool is active) -->
      <div class="dim-picker" id="dim-picker" hidden>
        <span class="dim-picker-label">Modus:</span>
        <button class="dim-mode-btn" data-mode="single" title="Einfache Bemaßung — 2 Messpunkte + Position">Einfach</button>
        <button class="dim-mode-btn" data-mode="chain"  title="Kettenbemaßung — jeder weitere Klick setzt die Kette fort">Gekettet</button>
        <button class="dim-mode-btn" data-mode="auto"   title="Automatisch — Kante anklicken und Bemaßung wird erzeugt">Automatisch</button>
      </div>

      <!-- Dim properties HUD: text size + alignment for the selected dim(s).
           Auto-shows whenever the selection contains at least one dim, hides
           otherwise. Lives bottom-left above the coord readout. -->
      <div class="dim-props" id="dim-props" hidden>
        <span class="dim-props-label">Text</span>
        <input class="dim-props-size" id="dim-props-size" type="number" min="0.5" step="0.5" title="Textgrösse (mm)">
        <span class="dim-props-sep"></span>
        <button class="dim-props-align-btn" data-align="start"  title="Am ersten Endpunkt">├</button>
        <button class="dim-props-align-btn" data-align="center" title="Mittig (Standard)">┼</button>
        <button class="dim-props-align-btn" data-align="end"    title="Am zweiten Endpunkt">┤</button>
      </div>

      <!-- Radius/diameter mode picker (visible only while the radius tool is active) -->
      <div class="dim-picker" id="radius-picker" hidden>
        <span class="dim-picker-label">Modus:</span>
        <button class="radius-mode-btn" data-mode="radius"   title="Radius — mit R vorangestellt">Radius</button>
        <button class="radius-mode-btn" data-mode="diameter" title="Durchmesser — mit Ø vorangestellt">Durchmesser</button>
      </div>

      <!-- Cross-mirror mode picker (Symmetrie-Tool). Radio group: 1/4 = quarter
           symmetry (three copies), 1/2 ↔ = horizontal reflect (copy to the
           side), 1/2 ↕ = vertical reflect (copy top/bottom). Visible only
           while the cross_mirror tool is active. -->
      <div class="dim-picker" id="cross-mirror-picker" hidden>
        <span class="dim-picker-label">Modus:</span>
        <button class="cross-mirror-mode-btn" data-mode="quarter" title="1/4-Symmetrie — reflektiert über beide Achsen und 180° um den Mittelpunkt (drei zusätzliche Kopien)" aria-label="1/4-Symmetrie">
          <svg viewBox="0 0 20 20" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" aria-hidden="true">
            <line x1="10" y1="2" x2="10" y2="18" stroke-dasharray="1.5 1.5" opacity="0.5"/>
            <line x1="2" y1="10" x2="18" y2="10" stroke-dasharray="1.5 1.5" opacity="0.5"/>
            <path d="M4 7 L7 4 L7 7 Z" fill="currentColor" stroke="none"/>
            <path d="M16 7 L13 4 L13 7 Z" opacity="0.6"/>
            <path d="M4 13 L7 16 L7 13 Z" opacity="0.6"/>
            <path d="M16 13 L13 16 L13 13 Z" opacity="0.6"/>
          </svg>
        </button>
        <button class="cross-mirror-mode-btn" data-mode="half_h"  title="1/2-Symmetrie horizontal — reflektiert über die Senkrechte durch den Mittelpunkt (links ↔ rechts)" aria-label="1/2-Symmetrie links/rechts">
          <svg viewBox="0 0 20 20" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" aria-hidden="true">
            <line x1="10" y1="2" x2="10" y2="18" stroke-dasharray="1.5 1.5" opacity="0.55"/>
            <path d="M3 14 L8 14 L8 5 Z" fill="currentColor" stroke="none"/>
            <path d="M17 14 L12 14 L12 5 Z" opacity="0.7"/>
          </svg>
        </button>
        <button class="cross-mirror-mode-btn" data-mode="half_v"  title="1/2-Symmetrie vertikal — reflektiert über die Waagerechte durch den Mittelpunkt (oben ↕ unten)" aria-label="1/2-Symmetrie oben/unten">
          <svg viewBox="0 0 20 20" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round" aria-hidden="true">
            <line x1="2" y1="10" x2="18" y2="10" stroke-dasharray="1.5 1.5" opacity="0.55"/>
            <path d="M3 3 L15 8 L3 8 Z" fill="currentColor" stroke="none"/>
            <path d="M3 17 L15 12 L3 12 Z" opacity="0.7"/>
          </svg>
        </button>
      </div>

      <!-- Line-offset mode picker (visible only while the line_offset tool is active).
           Two mode buttons (Linie / Verbinden) form a radio group; the Winkel
           button is an independent toggle that enables a symmetric trapezoid
           (connectors flare inward or outward). The angle input next to it is
           visible only when Winkel is on — user types the connector angle
           directly without going to the bottom cmdbar. -->
      <div class="dim-picker" id="line-offset-picker" hidden>
        <span class="dim-picker-label">Modus:</span>
        <button class="line-offset-mode-btn" data-mode="line" title="Nur die Linie versetzen">Linie</button>
        <button class="line-offset-mode-btn" data-mode="connect" title="Linie versetzen und mit zwei Verbindungslinien an den Endpunkten schliessen">Verbinden</button>
        <span class="dim-picker-sep"></span>
        <button class="line-offset-angle-btn" id="line-offset-angle" title="Winkel-Eingabe aktivieren — Verbinder laufen nicht senkrecht, sondern unter diesem Winkel (symmetrisches Trapez)">Winkel</button>
        <input class="line-offset-angle-value" id="line-offset-angle-value" type="number" min="-89" max="89" step="1" value="15" title="Neigung der Verbinder gegenüber der Senkrechten (Grad). 0° = Rechteck, positive Werte = Verbinder nach innen (Trapez enger auf Versatz-Seite), negative = nach aussen." hidden>
      </div>

      <!-- Divide-line panel (visible only while the divide_xline tool is
           active). Single numeric input for the count N; Enter commits and
           transitions the tool into its 'pick' step. Replaces the earlier
           modal — same HUD family as dim-picker / line-offset-picker so the
           interaction model stays consistent (pick a tool → panel appears at
           the top of the canvas). -->
      <div class="dim-picker" id="divide-picker" hidden>
        <span class="dim-picker-label">Anzahl Teile:</span>
        <input class="line-offset-angle-value divide-count" id="divide-count" type="number" min="2" max="200" step="1" value="2" title="Anzahl Teile (N → N-1 Hilfslinien)">
      </div>

      <!-- Fillet panel (Abrunden) — the radius is a sticky modifier ("gilt
           bis neu eingegeben"), not a per-operation length value. That fits
           the top-panel rule: modifiers/properties live up top, while the
           cmdbar stays reserved for length/angle inputs per click step.
           Accepts expression input so the user can bind the radius to a
           variable (evaluated via parseExprInput in ui.ts). -->
      <div class="dim-picker" id="fillet-picker" hidden>
        <span class="dim-picker-label">Radius:</span>
        <input class="line-offset-angle-value fillet-radius" id="fillet-radius" type="text" value="10" title="Abrundungsradius — sticky, gilt bis neu eingegeben">
      </div>

      <!-- Chamfer panel (Fase) — same pattern as fillet. Sticky distance
           modifier; typing here sets the default without requiring two
           lines picked. If two lines are already picked when the user hits
           Enter, the chamfer is committed immediately (same semantics as
           the old cmdbar field). -->
      <div class="dim-picker" id="chamfer-picker" hidden>
        <span class="dim-picker-label">Abstand:</span>
        <input class="line-offset-angle-value chamfer-distance" id="chamfer-distance" type="text" value="10" title="Fasenabstand — sticky, gilt bis neu eingegeben">
      </div>

      <!-- View controls (top-right) -->
      <div class="viewcube" id="viewcube">
        <button class="vc-btn" id="vc-zoom-in" title="Hineinzoomen">+</button>
        <button class="vc-btn" id="vc-zoom-out" title="Herauszoomen">−</button>
        <button class="vc-btn" id="vc-zoom-fit" title="Alles anzeigen">A</button>
      </div>

      <!-- Coordinate readout (bottom-left) -->
      <div class="coord-readout">
        <span id="st-pos"><em>X</em> <b>0.00</b></span>
        <span id="st-zoom"><em>Z</em> <b>100%</b></span>
        <span id="st-meas" hidden></span>
      </div>

      <div id="toast"></div>
    </div>

    <!-- ═══ SIDEBAR ═══ -->
    <aside id="sidebar">

      <!-- Collapse handle — toggles the whole sidebar between full width and a
           narrow rail. Fixed-positioned just OUTSIDE the sidebar's left edge
           (offset from the viewport's right by `--sidebar-w`) so the click
           target never overlaps the panel's inputs and tracks the sidebar
           width automatically via the same CSS variable. The chevron points
           into the sidebar when expanded (→ = collapse) and outward when
           collapsed (← = expand); CSS flips it via body.sidebar-collapsed. -->
      <button class="sidebar-collapse" id="sidebar-collapse-btn" title="Seitenleiste ein-/ausklappen (F4)" aria-label="Seitenleiste umschalten">
        <svg class="sidebar-collapse-chev" viewBox="0 0 12 12" width="10" height="10" aria-hidden="true">
          <path d="M4.5 3 L7.5 6 L4.5 9" stroke="currentColor" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div class="side-section open" data-section="layers">
        <button class="side-section-header">
          <svg class="chev" viewBox="0 0 12 12" width="10" height="10"><path d="M3 4.5 L6 7.5 L9 4.5" stroke="currentColor" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="side-title">Ebenen</span>
          <span class="side-count" id="side-count-layers"></span>
        </button>
        <div class="side-body">
          <div id="layers"></div>
          <div class="section-actions">
            <button class="mini-btn" id="btn-addlayer">+ Neue Ebene</button>
          </div>
        </div>
      </div>

      <div class="side-section open" data-section="props">
        <button class="side-section-header">
          <svg class="chev" viewBox="0 0 12 12" width="10" height="10"><path d="M3 4.5 L6 7.5 L9 4.5" stroke="currentColor" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="side-title">Eigenschaften</span>
          <span class="side-count" id="side-count-props"></span>
        </button>
        <div class="side-body">
          <div id="props"></div>
        </div>
      </div>

      <div class="side-section open" data-section="vars">
        <button class="side-section-header">
          <svg class="chev" viewBox="0 0 12 12" width="10" height="10"><path d="M3 4.5 L6 7.5 L9 4.5" stroke="currentColor" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="side-title">Variablen</span>
          <span class="side-count" id="side-count-vars"></span>
        </button>
        <div class="side-body">
          <div id="parameters"></div>
          <div class="section-actions">
            <button class="mini-btn" id="btn-addparam">+ Neue Variable</button>
          </div>
        </div>
      </div>

      <div class="side-section closed" data-section="history">
        <button class="side-section-header">
          <svg class="chev" viewBox="0 0 12 12" width="10" height="10"><path d="M3 4.5 L6 7.5 L9 4.5" stroke="currentColor" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="side-title">Verlauf</span>
          <span class="side-count" id="side-count-history"></span>
        </button>
        <div class="side-body">
          <div id="timeline"></div>
        </div>
      </div>

    </aside>

    <!-- ═══ COMMAND LINE ═══ -->
    <div id="cmdline">
      <span id="cmd-prompt">Werkzeug wählen</span>
      <div id="cmd-fields"></div>
      <span id="st-tip"></span>
    </div>

    <!-- ═══ STATUS BAR ═══ -->
    <div id="statusbar">
      <span id="st-tool" class="stat">Werkzeug: <b>Auswahl</b></span>
      <span class="st-sep"></span>
      <span id="st-sel" class="stat">Auswahl: <b>0</b></span>
      <span class="st-sep"></span>
      <span id="stats" class="stat">Objekte: <b>0</b></span>
      <span class="spacer"></span>
      <span class="stat hint">Pan: Leertaste+Ziehen · Zoom: Mausrad · Home: Alles anzeigen · Esc: Abbrechen</span>
    </div>

  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
