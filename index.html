<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>HektikCad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles.css">
  <style>html,body{background:#0b0e13;color:#e6eaf2;margin:0;height:100%;}</style>
</head>
<body>
  <div id="app">

    <!-- ═══ HEADER ═══ -->
    <header>
      <div class="brand">
        <div class="brand-mark">
          <svg width="20" height="20" viewBox="0 0 512 512" fill="none">
            <g transform="matrix(1.018795,0,0,1.019275,-704.225,-976.582)">
              <path d="M927.76,1266.318L927.76,1341.973C927.76,1374.567 901.298,1401.028 868.705,1401.028L691.539,1401.028L691.539,958.115L868.705,958.115C901.298,958.115 927.76,984.577 927.76,1017.17L927.76,1092.825" stroke="currentColor" stroke-width="40" stroke-linecap="round"/>
              <path d="M957.874,1152.231L957.874,1076.575C957.874,1043.981 984.336,1017.52 1016.929,1017.52L1194.094,1017.52L1194.094,1460.433L1016.929,1460.433C984.336,1460.433 957.874,1433.971 957.874,1401.377L957.874,1325.722" stroke="currentColor" stroke-width="40" stroke-linecap="round"/>
            </g>
          </svg>
        </div>
        <div class="brand-name">Hektik<span>Cad</span></div>
      </div>

      <div class="brand-doc">
        <span>zeichnung.hcd</span>
        <span class="doc-dirty">•</span>
      </div>

      <nav class="menu-bar">
        <button class="menu-item">Datei</button>
        <button class="menu-item">Bearbeiten</button>
        <button class="menu-item">Ansicht</button>
        <button class="menu-item">Einfügen</button>
        <button class="menu-item">Format</button>
        <button class="menu-item">Hilfe</button>
      </nav>

      <span class="spacer"></span>
      <span class="hdr-units">mm</span>

      <div class="hdr-actions">
        <button class="hdr-btn" id="btn-save">Speichern</button>
        <button class="hdr-btn" id="btn-load">Öffnen</button>
        <button class="hdr-btn" id="btn-export">SVG</button>
        <button class="hdr-btn danger" id="btn-clear">Löschen</button>
        <button class="hdr-btn" id="btn-theme" title="Design anpassen" aria-haspopup="dialog">
          <svg viewBox="0 0 18 18" width="14" height="14" aria-hidden="true">
            <circle cx="9" cy="9" r="6.5" fill="none" stroke="currentColor" stroke-width="1.3"/>
            <path d="M9 2.5 A 6.5 6.5 0 0 1 9 15.5 A 3 3 0 0 0 9 9.5 A 3 3 0 0 1 9 2.5 Z" fill="currentColor"/>
          </svg>
          Design
        </button>
      </div>
      <div id="theme-popover" class="theme-popover" hidden></div>
    </header>

    <!-- ═══ TOOL RAIL ═══ -->
    <div id="tools"></div>

    <!-- ═══ CANVAS ═══ -->
    <div id="canvaswrap">
      <canvas id="cv"></canvas>

      <!-- Floating snap toolbar (top-left) -->
      <div class="snap-toolbar" id="snap-overlay">
        <button class="snap-ob-btn" id="tb-raster" title="Raster anzeigen (F7)">RASTER</button>
        <button class="snap-ob-btn" id="tb-gridsnap" title="Am Raster fangen (F9)">R-FANG</button>
        <input class="snap-ob-grid" id="grid-size" type="number" min="0.1" step="1" value="10" title="Raster-Abstand (mm)">
        <div class="snap-sep"></div>
        <button class="snap-ob-btn on" id="tb-fang" title="Alle Fangpunkte umschalten">FANG</button>
        <button class="snap-ob-btn on" id="tb-end" title="Endpunkt">END</button>
        <button class="snap-ob-btn on" id="tb-mid" title="Mittelpunkt">MITTE</button>
        <button class="snap-ob-btn on" id="tb-int" title="Schnittpunkt">SCHN</button>
        <button class="snap-ob-btn on" id="tb-ctr" title="Zentrum">ZENTR</button>
        <button class="snap-ob-btn on" id="tb-perp" title="Lotpunkt">LOT</button>
        <button class="snap-ob-btn on" id="tb-tan" title="Tangente">TANG</button>
      </div>

      <!-- Dimension style picker (visible when dim tool active or dim selected) -->
      <div class="dim-picker" id="dim-picker" hidden>
        <span class="dim-picker-label">Bemassung:</span>
        <button class="dim-style-btn" data-style="arrow" title="Geschlossene Pfeile (ISO)">
          <svg viewBox="0 0 28 14" aria-hidden="true"><line x1="4" y1="7" x2="24" y2="7" stroke="currentColor" stroke-width="1.2"/><polygon points="4,7 10,4 10,10" fill="currentColor"/><polygon points="24,7 18,4 18,10" fill="currentColor"/></svg>
        </button>
        <button class="dim-style-btn" data-style="open" title="Offene Pfeile">
          <svg viewBox="0 0 28 14" aria-hidden="true"><line x1="4" y1="7" x2="24" y2="7" stroke="currentColor" stroke-width="1.2"/><polyline points="10,4 4,7 10,10" fill="none" stroke="currentColor" stroke-width="1.2"/><polyline points="18,4 24,7 18,10" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
        </button>
        <button class="dim-style-btn" data-style="tick" title="Strich (AutoCAD)">
          <svg viewBox="0 0 28 14" aria-hidden="true"><line x1="4" y1="7" x2="24" y2="7" stroke="currentColor" stroke-width="1.2"/><line x1="1" y1="11" x2="7" y2="3" stroke="currentColor" stroke-width="1.4"/><line x1="21" y1="11" x2="27" y2="3" stroke="currentColor" stroke-width="1.4"/></svg>
        </button>
        <button class="dim-style-btn" data-style="arch" title="Architektur-Tipp">
          <svg viewBox="0 0 28 14" aria-hidden="true"><line x1="4" y1="7" x2="24" y2="7" stroke="currentColor" stroke-width="1.2"/><line x1="4" y1="7" x2="9" y2="2" stroke="currentColor" stroke-width="1.4"/><line x1="24" y1="7" x2="19" y2="2" stroke="currentColor" stroke-width="1.4"/><circle cx="4" cy="7" r="1.4" fill="currentColor"/><circle cx="24" cy="7" r="1.4" fill="currentColor"/></svg>
        </button>
      </div>

      <!-- View controls (top-right) -->
      <div class="viewcube" id="viewcube">
        <button class="vc-btn" id="vc-zoom-in" title="Hineinzoomen">+</button>
        <button class="vc-btn" id="vc-zoom-out" title="Herauszoomen">−</button>
        <button class="vc-btn" id="vc-zoom-fit" title="Alles anzeigen">A</button>
      </div>

      <!-- Coordinate readout (bottom-left) -->
      <div class="coord-readout">
        <span id="st-pos"><em>X</em> <b>0.00</b></span>
        <span id="st-zoom"><em>Z</em> <b>100%</b></span>
      </div>

      <div id="toast"></div>
    </div>

    <!-- ═══ SIDEBAR ═══ -->
    <aside id="sidebar">

      <div class="side-section open" data-section="layers">
        <button class="side-section-header">
          <svg class="chev" viewBox="0 0 12 12" width="10" height="10"><path d="M3 4.5 L6 7.5 L9 4.5" stroke="currentColor" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="side-title">Ebenen</span>
          <span class="side-count" id="side-count-layers"></span>
        </button>
        <div class="side-body">
          <div id="layers"></div>
          <div class="section-actions">
            <button class="mini-btn" id="btn-addlayer">+ Neue Ebene</button>
          </div>
        </div>
      </div>

      <div class="side-section open" data-section="vars">
        <button class="side-section-header">
          <svg class="chev" viewBox="0 0 12 12" width="10" height="10"><path d="M3 4.5 L6 7.5 L9 4.5" stroke="currentColor" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="side-title">Variablen</span>
          <span class="side-count" id="side-count-vars"></span>
        </button>
        <div class="side-body">
          <div id="parameters"></div>
          <div class="section-actions">
            <button class="mini-btn" id="btn-addparam">+ Neue Variable</button>
          </div>
        </div>
      </div>

      <div class="side-section open" data-section="history">
        <button class="side-section-header">
          <svg class="chev" viewBox="0 0 12 12" width="10" height="10"><path d="M3 4.5 L6 7.5 L9 4.5" stroke="currentColor" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="side-title">Verlauf</span>
          <span class="side-count" id="side-count-history"></span>
        </button>
        <div class="side-body">
          <div id="timeline"></div>
        </div>
      </div>

      <div class="side-section closed" data-section="info">
        <button class="side-section-header">
          <svg class="chev" viewBox="0 0 12 12" width="10" height="10"><path d="M3 4.5 L6 7.5 L9 4.5" stroke="currentColor" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="side-title">Info</span>
        </button>
        <div class="side-body">
          <div id="stats"></div>
        </div>
      </div>

    </aside>

    <!-- ═══ COMMAND LINE ═══ -->
    <div id="cmdline">
      <span id="cmd-prompt">Werkzeug wählen</span>
      <div id="cmd-fields"></div>
      <span id="st-tip"></span>
    </div>

    <!-- ═══ STATUS BAR ═══ -->
    <div id="statusbar">
      <span id="st-tool" class="stat">Werkzeug: <b>Auswahl</b></span>
      <span class="st-sep"></span>
      <span id="st-sel" class="stat">Auswahl: <b>0</b></span>
      <span class="spacer"></span>
      <span class="stat hint">Pan: Leertaste+Ziehen · Zoom: Mausrad · Home: Alles anzeigen · Esc: Abbrechen</span>
    </div>

  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
