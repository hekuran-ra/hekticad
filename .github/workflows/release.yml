name: Release HektikCad

# Triggered by pushing a version tag: `git tag v0.3.0 && git push --tags`.
# Builds native installers on macOS (Universal) and Windows runners,
# signs them with the Tauri updater key (from secrets), and publishes them
# as a GitHub Release. The Tauri updater in the installed app checks the
# `latest.json` artifact this workflow publishes and offers in-app updates.
on:
  push:
    tags:
      - 'v*'
  # Manual trigger — useful when the tag-push event is swallowed by GitHub
  # (e.g. after a rapid delete+re-push cycle). Provide the existing tag name
  # as `tag` (e.g. "v0.2.10"); the workflow checks out that ref and publishes
  # the release against it.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to release (e.g. v0.2.10)'
        required: true
        type: string

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal builds need both architectures.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS deps
        run: npm ci

      - name: Cache Cargo registry + target
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Build & publish Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: 'HektikCad ${{ github.event_name == ''workflow_dispatch'' && inputs.tag || github.ref_name }}'
          releaseBody: 'See the changelog below for what changed. The installed app will auto-update on next launch.'
          # Publish immediately — the updater endpoint is
          # /releases/latest/download/latest.json, which resolves via the
          # "latest release" redirect and a draft release is NOT considered
          # latest. Leaving this `true` meant v0.2.5 shipped as a draft and
          # existing 0.2.4 installs kept seeing 0.2.4's latest.json.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
