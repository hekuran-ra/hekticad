name: Release HektikCad

# Triggered by pushing a version tag: `git tag v0.3.0 && git push --tags`.
# Builds native installers on macOS (Universal) and Windows runners,
# signs them with the Tauri updater key (from secrets), and publishes them
# as a GitHub Release. The Tauri updater in the installed app checks the
# `latest.json` artifact this workflow publishes and offers in-app updates.
#
# Workflow structure (3 jobs):
#   1. create-release  — ubuntu, creates a draft release, emits release_id
#   2. build           — macOS + Windows matrix, uploads signed artifacts to
#                        the draft release via releaseId (no create attempt)
#   3. publish-release — marks the draft as published once both builds finish
#
# This avoids the race condition that occurred when both matrix legs tried to
# create the same release simultaneously and the slower one got a 403.
on:
  push:
    tags:
      - 'v*'
  # Manual trigger — useful when the tag-push event is swallowed by GitHub
  # (e.g. after a rapid delete+re-push cycle). Provide the existing tag name
  # as `tag` (e.g. "v0.2.10"); the workflow checks out that ref and publishes
  # the release against it.
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to release (e.g. v0.2.10)'
        required: true
        type: string

# Prevent duplicate runs for the same tag (e.g. from rapid tag delete+push).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # don't cancel a running build; let it finish

jobs:
  # ── 1. Create the GitHub draft release ──────────────────────────────────
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.tag.outputs.tag }}';
            // Check if a release for this tag already exists (re-run safety).
            try {
              const { data: existing } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              console.log(`Release already exists (id=${existing.id}), reusing.`);
              return existing.id;
            } catch (e) {
              if (e.status !== 404) throw e;
            }
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `HektikCad ${tag}`,
              body: 'See the changelog below for what changed. The installed app will auto-update on next launch.',
              draft: true,
              prerelease: false,
            });
            return data.id;

  # ── 2. Build + upload artifacts ─────────────────────────────────────────
  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS universal builds need both architectures.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS deps
        run: npm ci

      - name: Cache Cargo registry + target
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Build & upload artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Passing releaseId skips release creation — tauri-action uploads
          # assets directly to the draft created by job 1.
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  # ── 3. Publish the release (after both builds succeed) ──────────────────
  publish-release:
    needs: [create-release, build]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });
            console.log('Release published.');
