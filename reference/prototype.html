<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>HektikCad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <header>
    <div class="brand">
      <div class="brand-mark">
        <svg width="20" height="20" viewBox="0 0 512 512" fill="none">
          <g transform="matrix(1.018795,0,0,1.019275,-704.225,-976.582)">
            <path d="M927.76,1266.318L927.76,1341.973C927.76,1374.567 901.298,1401.028 868.705,1401.028L691.539,1401.028L691.539,958.115L868.705,958.115C901.298,958.115 927.76,984.577 927.76,1017.17L927.76,1092.825" stroke="currentColor" stroke-width="40" stroke-linecap="round"/>
            <path d="M957.874,1152.231L957.874,1076.575C957.874,1043.981 984.336,1017.52 1016.929,1017.52L1194.094,1017.52L1194.094,1460.433L1016.929,1460.433C984.336,1460.433 957.874,1433.971 957.874,1401.377L957.874,1325.722" stroke="currentColor" stroke-width="40" stroke-linecap="round"/>
          </g>
        </svg>
      </div>
      <div class="brand-name">Hektik<span>Cad</span></div>
    </div>
    <div class="brand-doc">
      <span>wohnung_altbau_v3.hcd</span>
      <span class="doc-dirty">•</span>
    </div>
    <nav class="menu-bar">
      <button class="menu-item">Datei</button>
      <button class="menu-item">Bearbeiten</button>
      <button class="menu-item">Ansicht</button>
      <button class="menu-item">Einfügen</button>
      <button class="menu-item">Format</button>
      <button class="menu-item">Hilfe</button>
    </nav>
    <span class="spacer"></span>
    <span class="hdr-units">mm · 1:50</span>
    <button class="hdr-tweaks" id="tweaks-toggle">⚙ Tweaks</button>
  </header>
  <aside id="tools"></aside>
  <main id="stage"></main>
  <aside id="sidebar"></aside>
  <footer></footer>
</div>

<div id="tweaks">
  <h3>Tweaks <span class="close" id="tweaks-close">×</span></h3>
  <div class="tweak-row">
    <label>Hilfen-Farbe</label>
    <div class="swatches" data-tweak="guides">
      <button data-color="#34d399" style="background:#34d399"></button>
      <button data-color="#22c55e" style="background:#22c55e"></button>
      <button data-color="#14b8a6" style="background:#14b8a6"></button>
      <button data-color="#84cc16" style="background:#84cc16"></button>
    </div>
  </div>
  <div class="tweak-row">
    <label>Zeichnen-Farbe</label>
    <div class="swatches" data-tweak="draw">
      <button data-color="#fbbf24" style="background:#fbbf24"></button>
      <button data-color="#f59e0b" style="background:#f59e0b"></button>
      <button data-color="#fb923c" style="background:#fb923c"></button>
      <button data-color="#eab308" style="background:#eab308"></button>
    </div>
  </div>
  <div class="tweak-row">
    <label>Ändern-Farbe</label>
    <div class="swatches" data-tweak="modify">
      <button data-color="#f87171" style="background:#f87171"></button>
      <button data-color="#ef4444" style="background:#ef4444"></button>
      <button data-color="#ec4899" style="background:#ec4899"></button>
      <button data-color="#f43f5e" style="background:#f43f5e"></button>
    </div>
  </div>
  <div class="tweak-row">
    <label>Auswahl-Farbe</label>
    <div class="swatches" data-tweak="sel">
      <button data-color="#22d3ee" style="background:#22d3ee"></button>
      <button data-color="#38bdf8" style="background:#38bdf8"></button>
      <button data-color="#a78bfa" style="background:#a78bfa"></button>
      <button data-color="#818cf8" style="background:#818cf8"></button>
    </div>
  </div>
  <div class="tweak-row">
    <label>Raster</label>
    <select id="tw-grid">
      <option value="on">Ein</option>
      <option value="off">Aus</option>
    </select>
  </div>
  <div class="tweak-row">
    <label>Icon-Stärke</label>
    <input type="range" id="tw-stroke" min="1" max="2.5" step="0.1" value="1.5">
  </div>
</div>

<script>
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "guides": "#14b8a6",
  "draw": "#fbbf24",
  "modify": "#f87171",
  "sel": "#22d3ee",
  "grid": "on",
  "stroke": 1.6
}/*EDITMODE-END*/;
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="scene.jsx"></script>
<script type="text/babel" src="canvas.jsx"></script>
<script type="text/babel" src="panels.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script>
// Tweaks wiring
(function(){
  const applyTweaks = (t) => {
    const root = document.documentElement;
    root.style.setProperty('--guides', t.guides);
    root.style.setProperty('--draw', t.draw);
    root.style.setProperty('--modify', t.modify);
    root.style.setProperty('--sel', t.sel);
    document.querySelectorAll('#tools svg, .tool-btn svg').forEach(s => s.setAttribute('stroke-width', t.stroke));
    // mark swatch buttons
    document.querySelectorAll('#tweaks .swatches').forEach(group => {
      const key = group.dataset.tweak;
      group.querySelectorAll('button').forEach(b => b.classList.toggle('on', b.dataset.color === t[key]));
    });
    const gs = document.getElementById('tw-grid'); if (gs) gs.value = t.grid;
    const ss = document.getElementById('tw-stroke'); if (ss) ss.value = t.stroke;
    window.__gridOn = t.grid === 'on';
    if (window.__setGrid) window.__setGrid(t.grid === 'on');
  };
  let cur = {...TWEAK_DEFAULTS};
  applyTweaks(cur);

  const updateAndPersist = (patch) => {
    cur = {...cur, ...patch};
    applyTweaks(cur);
    window.parent.postMessage({type: '__edit_mode_set_keys', edits: patch}, '*');
  };

  // listener BEFORE announcing
  window.addEventListener('message', (ev) => {
    if (!ev.data) return;
    if (ev.data.type === '__activate_edit_mode') {
      document.getElementById('tweaks-toggle').classList.add('visible');
      document.getElementById('tweaks').classList.add('open');
    } else if (ev.data.type === '__deactivate_edit_mode') {
      document.getElementById('tweaks-toggle').classList.remove('visible');
      document.getElementById('tweaks').classList.remove('open');
    }
  });
  window.parent.postMessage({type: '__edit_mode_available'}, '*');

  document.getElementById('tweaks-toggle').onclick = () => {
    document.getElementById('tweaks').classList.toggle('open');
  };
  document.getElementById('tweaks-close').onclick = () => {
    document.getElementById('tweaks').classList.remove('open');
  };
  document.querySelectorAll('#tweaks .swatches').forEach(group => {
    const key = group.dataset.tweak;
    group.querySelectorAll('button').forEach(b => {
      b.onclick = () => updateAndPersist({[key]: b.dataset.color});
    });
  });
  document.getElementById('tw-grid').onchange = (e) => updateAndPersist({grid: e.target.value});
  document.getElementById('tw-stroke').oninput = (e) => updateAndPersist({stroke: parseFloat(e.target.value)});
})();
</script>
</body>
</html>
